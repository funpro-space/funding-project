# Optimized Cloud Build configuration for funpro-space-main
# Reference: https://cloud.google.com/build/docs/configuring-builds/create-basic-configuration
# Trigger should map variables: _MONGODB_URI, _MONGODB_DB, _SESSION_SECRET, _DEPLOYER_PRIVATE_KEY, _NEXT_PUBLIC_PRIVY_APP_ID, _NEXT_PUBLIC_ONCHAINKIT_API_KEY, _GEMINI_API_KEY.

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. Build optimized Next.js standalone Docker image
  - id: 'build'
    name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "[Build] Starting optimized multi-stage Docker build..."
        docker build \
          --build-arg NEXT_PUBLIC_PRIVY_APP_ID=${_NEXT_PUBLIC_PRIVY_APP_ID} \
          --build-arg NEXT_PUBLIC_ONCHAINKIT_API_KEY=${_NEXT_PUBLIC_ONCHAINKIT_API_KEY} \
          -t us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/funpro-space-funding-project/funpro-space-main:$COMMIT_SHA \
          .

  # 2. Push built image to Artifact Registry
  - id: 'push'
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/funpro-space-funding-project/funpro-space-main:$COMMIT_SHA'

  # 3. Deploy to Google Cloud Run and apply environment variables
  - id: 'deploy'
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'funpro-space-main'
      - '--image'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/funpro-space-funding-project/funpro-space-main:$COMMIT_SHA'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'NODE_ENV=production,MONGODB_URI=${_MONGODB_URI},MONGODB_DB=${_MONGODB_DB},SESSION_SECRET=${_SESSION_SECRET},DEPLOYER_PRIVATE_KEY=${_DEPLOYER_PRIVATE_KEY},NEXT_PUBLIC_PRIVY_APP_ID=${_NEXT_PUBLIC_PRIVY_APP_ID},NEXT_PUBLIC_ONCHAINKIT_API_KEY=${_NEXT_PUBLIC_ONCHAINKIT_API_KEY},GEMINI_API_KEY=${_GEMINI_API_KEY},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-west1'
      - '--quiet'

images:
  - 'us-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/funpro-space-funding-project/funpro-space-main:$COMMIT_SHA'

# LEAVE THE VALUES BLANK OR USE DUMMY PLACEHOLDERS HERE FOR PUBLIC GITHUB:
substitutions:
  _GEMINI_API_KEY: 'placeholder-gemini-key'
  _NEXT_PUBLIC_PRIVY_APP_ID: 'placeholder-app-id'
  _NEXT_PUBLIC_ONCHAINKIT_API_KEY: 'placeholder-api-key'
  _MONGODB_DB: 'funpro'
  _MONGODB_URI: 'placeholder-uri'
  _SESSION_SECRET: 'placeholder-session-secret'
  _DEPLOYER_PRIVATE_KEY: 'placeholder-private-key'
