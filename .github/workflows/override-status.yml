name: Override Deploy Status

on:
  status:

permissions:
  statuses: write

jobs:
  override:
    runs-on: ubuntu-latest
    # Prevent infinite loops by verifying we don't trigger on our own overridden status description
    if: |
      github.event.state == 'success' &&
      (contains(github.event.context, 'refreshing-rune') || contains(github.event.context, 'google-cloud-build')) &&
      !contains(github.event.description, '🚀 Production Deploy')
    steps:
      - name: Mask and Override Status
        uses: actions/github-script@v7
        with:
          script: |
            const statusContext = context.payload.context;
            const sha = context.payload.sha;
            
            console.log(`Intercepted status for context: ${statusContext}, SHA: ${sha}`);
            
            // Override the GCP status check with clean metadata
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'success',
              context: statusContext,
              description: '🚀 Production Deploy',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions`
            });
            
            console.log('Successfully updated status check with masked description.');
